upstream evaluasi_app {
    server evaluasi:5000;
    keepalive 32;
}

# Redirect HTTP → HTTPS (aktifkan jika sudah pasang SSL)
# server {
#     listen 80;
#     server_name evaluasi.mmi-pt.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;   # Ganti dengan domain asli jika ada

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Upload limit (untuk export/import future feature) ───────────────────
    client_max_body_size 16M;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # ── Static files (opsional: bisa serve langsung dari nginx) ─────────────
    # location /static/ {
    #     alias /app/static/;
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    # }

    # ── Proxy ke Gunicorn untuk Public Booking (Allow Iframe) ────────────────
    location /booking/public {
        proxy_pass         http://evaluasi_app;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 16k;

        # Override global server headers (tidak menyertakan X-Frame-Options SAMEORIGIN)
        add_header X-Content-Type-Options   "nosniff"     always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        
        # Izinkan iframe dari domain luar (wildcard *)
        add_header Content-Security-Policy  "frame-ancestors 'self' *" always;
    }

    # ── Proxy ke Gunicorn ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://evaluasi_app;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 16k;
    }

    # ── Health check endpoint (untuk load balancer) ─────────────────────────
    location /health {
        access_log off;
        proxy_pass http://evaluasi_app/login;
    }

    # ── Block akses ke file sensitif ────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(db|sqlite|env)$ {
        deny all;
        return 404;
    }
}
