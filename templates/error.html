{% extends 'base.html' %}
{% block title %}Error {{ code }}{% endblock %}
{% block page_title %}<span class="breadcrumb-page">Error {{ code }}</span>{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center py-5 text-center">
  <div style="font-size:5rem;line-height:1;color:{{ '#dc2626' if code==500 else '#6b7280' }}">
    <i class="bi {{ 'bi-exclamation-triangle' if code==500 else 'bi-search' }}"></i>
  </div>
  <h2 class="fw-bold mt-3 mb-1">{{ code }}</h2>
  <p class="text-muted mb-4" style="max-width:380px">{{ msg }}</p>
  <a href="{{ url_for('portal') }}" class="btn btn-primary">
    <i class="bi bi-house me-1"></i>Kembali ke Portal
  </a>
</div>
{% endblock %}
