{% extends 'base.html' %}
{% block title %}AssetCore — Tambah Request Alat Kerja{% endblock %}
{% block page_title %}<span class="breadcrumb-page">Tambah Request Alat Kerja</span>{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-2 mb-3">
  <a href="/aset/tool-requests" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <h6 class="fw-bold mb-0">Tambah Request Alat Kerja</h6>
</div>

<div class="card border-0 shadow-sm" style="max-width:560px">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold small">Karyawan / Pemohon</label>
          <select name="employee_id" class="form-select form-select-sm">
            <option value="">— Pilih Karyawan —</option>
            {% for e in employees %}
            <option value="{{ e.id }}">{{ e.name }} ({{ e.divisi }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold small">Nama Alat Kerja (Contoh: Laptop) <span class="text-danger">*</span></label>
          <input name="item_name" class="form-control form-control-sm" placeholder="Contoh: Laptop, PC, Monitor" required>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold small">Alasan / Kebutuhan</label>
          <textarea name="reason" rows="3" class="form-control form-control-sm" placeholder="Jelaskan detail kebutuhan alat kerja…"></textarea>
        </div>
      </div>
      <div class="mt-3 d-flex gap-2">
        <button type="submit" class="btn btn-primary btn-sm">Kirim Request</button>
        <a href="/aset/tool-requests" class="btn btn-outline-secondary btn-sm">Batal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
