<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password — TalentCore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#1a2a3a 0%,#2d4a6a 100%); min-height:100vh; display:flex; align-items:center; }
    .card { border-radius:16px; }
    .strength-bar { height:4px; border-radius:2px; transition:width .3s,background .3s; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">

      <div class="text-center mb-4">
        <div style="width:64px;height:64px;background:linear-gradient(135deg,#1a7a3a,#25D366);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
          <i class="bi bi-shield-lock-fill text-white" style="font-size:1.8rem"></i>
        </div>
        <h5 class="text-white fw-bold mb-0">Buat Password Baru</h5>
        <p class="text-white-50 small">untuk akun <b class="text-white">{{ user.username }}</b></p>
      </div>

      <div class="card border-0 shadow-lg">
        <div class="card-body p-4">

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2 small alert-dismissible fade show">
              {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
          {% endwith %}

          <form method="POST" autocomplete="off" onsubmit="return validateForm()">
            <div class="mb-3">
              <label class="form-label fw-semibold small">Password Baru <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="password" name="password" id="newPass" class="form-control"
                       placeholder="Minimal 6 karakter" minlength="6" required
                       oninput="checkStrength(this.value)">
                <button class="btn btn-outline-secondary" type="button" onclick="togglePass('newPass',this)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
              <div class="mt-1">
                <div class="bg-light rounded" style="height:4px">
                  <div id="strengthBar" class="strength-bar" style="width:0;background:#dc3545"></div>
                </div>
                <div id="strengthText" class="form-text"></div>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold small">Konfirmasi Password <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="password" name="password2" id="confPass" class="form-control"
                       placeholder="Ulangi password baru" required
                       oninput="checkMatch()">
                <button class="btn btn-outline-secondary" type="button" onclick="togglePass('confPass',this)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
              <div id="matchText" class="form-text"></div>
            </div>

            <button type="submit" class="btn btn-success fw-bold w-100">
              <i class="bi bi-check-circle me-1"></i>Simpan Password Baru
            </button>
          </form>

          <div class="text-center mt-3">
            <a href="/login" class="text-muted small">
              <i class="bi bi-arrow-left me-1"></i>Kembali ke Login
            </a>
          </div>

          <hr class="my-3">
          <div class="small text-muted text-center">
            <i class="bi bi-exclamation-triangle me-1"></i>
            Link ini <b>langsung kadaluarsa</b> setelah password berhasil disimpan.
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  const isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  btn.innerHTML = isPass ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
}

function checkStrength(val) {
  const bar  = document.getElementById('strengthBar');
  const text = document.getElementById('strengthText');
  let score = 0;
  if (val.length >= 6)  score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { w:'20%', c:'#dc3545', t:'Sangat lemah' },
    { w:'40%', c:'#fd7e14', t:'Lemah' },
    { w:'60%', c:'#ffc107', t:'Cukup' },
    { w:'80%', c:'#20c997', t:'Kuat' },
    { w:'100%',c:'#198754', t:'Sangat kuat' },
  ];
  const l = levels[Math.min(score, 4)];
  bar.style.width = l.w; bar.style.background = l.c;
  text.textContent = val.length ? l.t : '';
  text.style.color = l.c;
}

function checkMatch() {
  const p1 = document.getElementById('newPass').value;
  const p2 = document.getElementById('confPass').value;
  const el  = document.getElementById('matchText');
  if (!p2) { el.textContent = ''; return; }
  if (p1 === p2) {
    el.textContent = '✓ Password cocok'; el.style.color = '#198754';
  } else {
    el.textContent = '✗ Password tidak cocok'; el.style.color = '#dc3545';
  }
}

function validateForm() {
  const p1 = document.getElementById('newPass').value;
  const p2 = document.getElementById('confPass').value;
  if (p1 !== p2) { alert('Konfirmasi password tidak cocok.'); return false; }
  if (p1.length < 6) { alert('Password minimal 6 karakter.'); return false; }
  return true;
}
</script>
</body>
</html>
