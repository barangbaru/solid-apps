<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — TalentCore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #1e2a3a; min-height: 100vh;
           display: flex; align-items: center; justify-content: center;
           font-family: 'Nunito', sans-serif; }
    .login-card { width: 400px; border: none; border-radius: 16px;
                  box-shadow: 0 20px 60px rgba(0,0,0,.4); }
    .login-header { background: #253447;
                    border-radius: 16px 16px 0 0; padding: 2rem; text-align: center;
                    border-bottom: 1px solid rgba(255,255,255,.07); }
    .brand-icon { width:56px; height:56px; background:#4da8da; border-radius:14px;
                  display:inline-flex; align-items:center; justify-content:center;
                  font-size:1.7rem; color:#fff; margin-bottom:.75rem; }
    .form-control:focus { border-color: #4da8da; box-shadow: 0 0 0 .2rem rgba(77,168,218,.25); }
    .btn-login { background: #4da8da; border: none;
                 padding: .6rem; font-weight: 700; letter-spacing: .3px; }
    .btn-login:hover { background: #3a96c8; }
  </style>
</head>
<body>
<div class="login-card card">
  <div class="login-header">
    <div class="brand-icon"><i class="bi bi-clipboard2-check"></i></div>
    <h5 class="mb-0 fw-bold text-white">TalentCore</h5>
    <small style="color:rgba(255,255,255,.5)">Sistem Penilaian Tim IT</small>
  </div>
  <div class="card-body p-4">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alert alert-{{ cat }} py-2 small mb-3">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold text-muted small">USERNAME</label>
        <div class="input-group">
          <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Masukkan username"
                 autofocus autocomplete="username" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold text-muted small">PASSWORD</label>
        <div class="input-group">
          <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" id="pwInput"
                 placeholder="Masukkan password" autocomplete="current-password" required>
          <button type="button" class="btn btn-outline-secondary" onclick="togglePw()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-login btn-primary w-100 text-white">
        <i class="bi bi-box-arrow-in-right me-1"></i> Masuk
      </button>
    </form>
    <div class="text-center mt-3">
      <a href="/forgot-password" class="text-muted small">
        <i class="bi bi-key me-1"></i>Lupa password?
      </a>
    </div>
  </div>
  <div class="card-footer text-center text-muted small py-3 bg-light rounded-bottom">
    <i class="bi bi-shield-lock me-1"></i> Akses dibatasi — hanya pengguna terdaftar
  </div>
</div>
<script>
function togglePw() {
  const i = document.getElementById('pwInput');
  const e = document.getElementById('eyeIcon');
  if (i.type === 'password') { i.type = 'text';     e.className = 'bi bi-eye-slash'; }
  else                        { i.type = 'password'; e.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
