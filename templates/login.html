<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Evaluasi Kinerja</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .login-card { width: 400px; border: none; border-radius: 16px;
                  box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .login-header { background: linear-gradient(135deg,#0d6efd,#6610f2);
                    border-radius: 16px 16px 0 0; padding: 2rem; text-align: center; }
    .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 .2rem rgba(13,110,253,.25); }
    .btn-login { background: linear-gradient(135deg,#0d6efd,#6610f2); border: none;
                 padding: .6rem; font-weight: 600; letter-spacing: .5px; }
    .btn-login:hover { opacity: .9; }
  </style>
</head>
<body>
<div class="login-card card">
  <div class="login-header text-white">
    <i class="bi bi-clipboard2-check-fill" style="font-size:2.5rem"></i>
    <h4 class="mt-2 mb-0 fw-bold">Evaluasi Kinerja</h4>
    <small class="opacity-75">Sistem Penilaian Tim IT</small>
  </div>
  <div class="card-body p-4">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alert alert-{{ cat }} py-2 small mb-3">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold text-muted small">USERNAME</label>
        <div class="input-group">
          <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Masukkan username"
                 autofocus autocomplete="username" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold text-muted small">PASSWORD</label>
        <div class="input-group">
          <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" id="pwInput"
                 placeholder="Masukkan password" autocomplete="current-password" required>
          <button type="button" class="btn btn-outline-secondary" onclick="togglePw()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-login btn-primary w-100 text-white">
        <i class="bi bi-box-arrow-in-right me-1"></i> Masuk
      </button>
    </form>
  </div>
  <div class="card-footer text-center text-muted small py-3 bg-light rounded-bottom">
    <i class="bi bi-shield-lock me-1"></i> Akses dibatasi — hanya pengguna terdaftar
  </div>
</div>
<script>
function togglePw() {
  const i = document.getElementById('pwInput');
  const e = document.getElementById('eyeIcon');
  if (i.type === 'password') { i.type = 'text';     e.className = 'bi bi-eye-slash'; }
  else                        { i.type = 'password'; e.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
