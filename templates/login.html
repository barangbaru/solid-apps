<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — super-us</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      background: #06080f;
    }

    /* ── Aurora background ── */
    .aurora {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      z-index: 0;
      pointer-events: none;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .65;
      animation: drift linear infinite;
      transform-origin: center center;
    }
    .b1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #3b0f8c 0%, transparent 70%);
      top: 10%; left: 5%;
      animation-duration: 22s;
      animation-name: drift1;
    }
    .b2 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #0d5c8c 0%, transparent 70%);
      top: 30%; right: 10%;
      animation-duration: 28s;
      animation-name: drift2;
    }
    .b3 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #6f1fa8 0%, transparent 70%);
      bottom: 5%; left: 20%;
      animation-duration: 18s;
      animation-name: drift3;
    }
    .b4 {
      width: 550px; height: 550px;
      background: radial-gradient(circle, #0a6e5c 0%, transparent 70%);
      bottom: 20%; right: 5%;
      animation-duration: 32s;
      animation-name: drift4;
    }
    .b5 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #8b1a6b 0%, transparent 70%);
      top: 5%; right: 30%;
      animation-duration: 24s;
      animation-name: drift5;
    }
    .b6 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, #1a3a8c 0%, transparent 70%);
      top: 50%; left: 40%;
      animation-duration: 20s;
      animation-name: drift1;
      animation-delay: -10s;
    }

    @keyframes drift1 {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(80px,-60px) scale(1.1); }
      66%  { transform: translate(-50px,80px) scale(.95); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes drift2 {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(-90px,70px) scale(1.05); }
      66%  { transform: translate(60px,-50px) scale(1.1); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes drift3 {
      0%   { transform: translate(0,0) scale(1); }
      25%  { transform: translate(70px,50px) scale(1.08); }
      50%  { transform: translate(-30px,-70px) scale(.92); }
      75%  { transform: translate(50px,-30px) scale(1.05); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes drift4 {
      0%   { transform: translate(0,0) scale(1); }
      40%  { transform: translate(-60px,-80px) scale(1.12); }
      70%  { transform: translate(80px,40px) scale(.9); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes drift5 {
      0%   { transform: translate(0,0) scale(1) rotate(0deg); }
      50%  { transform: translate(50px,80px) scale(1.1) rotate(10deg); }
      100% { transform: translate(0,0) scale(1) rotate(0deg); }
    }

    /* Noise texture overlay */
    .aurora::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: .4;
      pointer-events: none;
    }

    /* ── Login card ── */
    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      padding: 1rem;
    }
    .login-card {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      background: rgba(10,12,24,.72);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.06);
      overflow: hidden;
    }
    .login-header {
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .brand-ring {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #4da8da, #6f42c1);
      font-size: 1.9rem;
      color: #fff;
      margin-bottom: .9rem;
      box-shadow: 0 8px 24px rgba(77,168,218,.35);
    }
    .brand-name {
      font-size: 1.25rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.5px;
      margin-bottom: .2rem;
    }
    .brand-sub { color: rgba(255,255,255,.4); font-size: .8rem; }

    .login-body { padding: 1.75rem 2rem 2rem; }

    .form-label { color: rgba(255,255,255,.6); font-size: .75rem; font-weight: 700;
                  letter-spacing: .08em; text-transform: uppercase; margin-bottom: .4rem; }
    .form-control {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff;
      border-radius: 10px;
      padding: .6rem .9rem;
    }
    .form-control::placeholder { color: rgba(255,255,255,.25); }
    .form-control:focus {
      background: rgba(255,255,255,.1);
      border-color: #4da8da;
      box-shadow: 0 0 0 3px rgba(77,168,218,.2);
      color: #fff;
    }
    .input-group-text {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.45);
      border-radius: 10px 0 0 10px;
    }
    .input-group .form-control { border-radius: 0 10px 10px 0; }
    .input-group .btn { background: rgba(255,255,255,.07); border-color: rgba(255,255,255,.12);
                        color: rgba(255,255,255,.45); border-radius: 0 10px 10px 0; }
    .input-group .btn:hover { background: rgba(255,255,255,.14); color: #fff; }

    .btn-login {
      background: linear-gradient(135deg, #4da8da, #6f42c1);
      border: none;
      border-radius: 10px;
      padding: .7rem;
      font-weight: 700;
      font-size: .95rem;
      color: #fff;
      letter-spacing: .3px;
      transition: opacity .2s, transform .15s;
    }
    .btn-login:hover { opacity: .9; transform: translateY(-1px); color: #fff; }
    .btn-login:active { transform: translateY(0); }

    .alert { border-radius: 10px; font-size: .85rem; }
    .alert-danger  { background: rgba(220,53,69,.15); border-color: rgba(220,53,69,.3); color: #f8a0a8; }
    .alert-success { background: rgba(25,135,84,.15); border-color: rgba(25,135,84,.3); color: #6ee4a0; }
    .alert-warning { background: rgba(255,193,7,.1); border-color: rgba(255,193,7,.25); color: #ffe083; }
    .alert-info    { background: rgba(13,202,240,.1); border-color: rgba(13,202,240,.2); color: #7edff5; }

    .login-footer {
      text-align: center;
      padding: 1rem 2rem 1.5rem;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .forgot-link { color: rgba(255,255,255,.35); font-size: .82rem; text-decoration: none; transition: color .15s; }
    .forgot-link:hover { color: #4da8da; }
    .footer-note { color: rgba(255,255,255,.2); font-size: .75rem; margin-top: .6rem; }
  </style>
</head>
<body>

<!-- Aurora animated background -->
<div class="aurora">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
  <div class="blob b5"></div>
  <div class="blob b6"></div>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <div class="brand-ring"><i class="bi bi-grid-3x3-gap-fill"></i></div>
      <div class="brand-name">super-us</div>
      <div class="brand-sub">Platform Aplikasi Tim IT</div>
    </div>

    <div class="login-body">
      {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in msgs %}
          <div class="alert alert-{{ cat }} py-2 small mb-3">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post" autocomplete="off">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control"
                   placeholder="Masukkan username" autofocus autocomplete="username" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" id="pwInput"
                   placeholder="Masukkan password" autocomplete="current-password" required>
            <button type="button" class="btn" onclick="togglePw()">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-login w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
        </button>
      </form>
    </div>

    <div class="login-footer">
      <a href="/forgot-password" class="forgot-link">
        <i class="bi bi-key me-1"></i>Lupa password?
      </a>
      <div class="footer-note"><i class="bi bi-shield-lock me-1"></i>Akses dibatasi — hanya pengguna terdaftar</div>
    </div>
  </div>
</div>

<script>
function togglePw() {
  const i = document.getElementById('pwInput');
  const e = document.getElementById('eyeIcon');
  i.type = i.type === 'password' ? 'text' : 'password';
  e.className = i.type === 'text' ? 'bi bi-eye-slash' : 'bi bi-eye';
}
</script>
</body>
</html>
