<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verifikasi MFA — Evaluasi Kinerja</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#1e2a3a 0%,#2d4059 100%); min-height:100vh; display:flex; align-items:center; }
    .login-card { max-width:380px; width:100%; margin:auto; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.4); }
  </style>
</head>
<body>
<div class="container">
  <div class="login-card card border-0 p-4">
    <div class="text-center mb-4">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#4da8da,#1e2a3a);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
        <i class="bi bi-shield-lock-fill text-white" style="font-size:1.8rem"></i>
      </div>
      <h5 class="fw-bold mb-1">Verifikasi MFA</h5>
      <p class="text-muted small">Masukkan kode 6 digit dari Google Authenticator</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" autocomplete="off">
      <div class="mb-4">
        <label class="form-label fw-semibold small">Kode Authenticator</label>
        <input type="text" name="code" class="form-control form-control-lg text-center fw-bold"
               inputmode="numeric" pattern="\d{6}" maxlength="6" placeholder="000000" autofocus
               style="letter-spacing:.5em;font-size:2rem">
        <div class="form-text text-center mt-1">Buka Google Authenticator di HP Anda</div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
        <i class="bi bi-shield-check me-1"></i> Verifikasi
      </button>
    </form>
    <div class="text-center mt-3">
      <a href="{{ url_for('login') }}" class="text-muted small">
        <i class="bi bi-arrow-left me-1"></i>Kembali ke login
      </a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
